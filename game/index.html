<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trailer Park Dash</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #0b1220;
  font-family: Arial;
  <div style="
    background:#0b1117;
    border:1px solid #2b3a4a;
    padding:20px;
    margin:20px;
    color:#d7dde5;
    font-family:Courier New, monospace;
">

<h2 style="margin-top:0; color:#e2e8f0;">GAME BRIEFING</h2>

<div style="line-height:1.7; font-size:14px;">

<b>INSTRUCTIONS:</b><br>
Use the arrow keys to navigate between trailers.<br><br>

<b>SCORING SYSTEM:</b><br>
Roadkill = <b style="color:#4ade80;">+5 points</b><br>
Beer = <b style="color:#fbbf24;">+1 point</b><br><br>

<b class="alert">HAZARD:</b><br>
Hit a Rabid Raccoon = <b style="color:#ff4d4d;">GAME OVER</b><br><br>

<b>OBJECTIVE:</b><br>
Survive the trailer park and maximize your score before the shift ends.

</div>

</div>
}

canvas {
  display: block;
  margin: auto;
  touch-action: none;
}

#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-size: 18px;
}

.overlay {
  position: absolute;
  width: 100%;
  top: 40%;
  text-align: center;
  color: white;
}

button {
  padding: 10px 16px;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="hud">Score: 0</div>

<div id="startScreen" class="overlay">
  <h1>🍺 Trailer Park Dash</h1>
  <button onclick="startGame()">Start</button>
</div>

<div id="gameOverScreen" class="overlay" style="display:none;">
  <h1>💀 GAME OVER</h1>
  <p id="finalScore"></p>
  <button onclick="location.reload()">Restart</button>
</div>

<canvas id="game" width="420" height="650"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* ---------------- STATE ---------------- */

let running = false;
let gameOver = false;

let score = 0;

/* 🧍 player */
let player = { x: 190, y: 540 };
let targetX = 190;

/* objects */
let beers = [];
let campers = [];
let deer = [];
let raccoons = [];

/* difficulty */
let speed = 2;
let difficulty = 1;

/* effects */
let shake = 0;
let flash = 0;
let slowTimer = 0;

/* ---------------- AUDIO ---------------- */

let audioCtx;

/* 🍺 sound */
function drinkSound() {
  try {
    if (!audioCtx) audioCtx = new AudioContext();

    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();

    o.connect(g);
    g.connect(audioCtx.destination);

    o.frequency.setValueAtTime(520, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(180, audioCtx.currentTime + 0.14);

    g.gain.value = 0.05;

    o.start();
    o.stop(audioCtx.currentTime + 0.14);
  } catch(e) {}
}

/* 💥 hit */
function hitSound() {
  try {
    if (!audioCtx) audioCtx = new AudioContext();

    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();

    o.connect(g);
    g.connect(audioCtx.destination);

    o.frequency.value = 120;
    g.gain.value = 0.06;

    o.start();
    o.stop(audioCtx.currentTime + 0.06);
  } catch(e) {}
}

/* 🎵 MUSIC */
let musicStarted = false;

function startMusic() {
  if (musicStarted) return;
  musicStarted = true;

  const musicCtx = new (window.AudioContext || window.webkitAudioContext)();

  const notes = [220, 262, 330, 262, 220, 196, 220, 262];
  let i = 0;

  setInterval(() => {
    const o = musicCtx.createOscillator();
    const g = musicCtx.createGain();

    o.connect(g);
    g.connect(musicCtx.destination);

    o.frequency.value = notes[i % notes.length];
    o.type = "triangle";

    g.gain.value = 0.02;

    o.start();
    o.stop(musicCtx.currentTime + 0.18);

    i++;
  }, 150);
}

/* ---------------- INPUT ---------------- */

document.addEventListener("keydown", (e) => {
  if (!running || gameOver) return;

  let move = slowTimer > 0 ? 14 : 22;

  if (e.key === "ArrowLeft") targetX -= move;
  if (e.key === "ArrowRight") targetX += move;

  targetX = Math.max(0, Math.min(380, targetX));
});

/* 📱 swipe */
let touchStartX = 0;

document.addEventListener("touchstart", (e) => {
  if (!running || gameOver) return;
  touchStartX = e.changedTouches[0].clientX;
});

document.addEventListener("touchend", (e) => {
  if (!running || gameOver) return;

  let diff = e.changedTouches[0].clientX - touchStartX;

  if (Math.abs(diff) < 30) return;

  targetX += diff > 0 ? 80 : -80;
  targetX = Math.max(0, Math.min(380, targetX));
});

/* ---------------- SPAWN ---------------- */

function spawn() {
  if (Math.random() < 0.03) beers.push({ x: Math.random()*380, y: -20 });
  if (Math.random() < 0.02) campers.push({ x: Math.random()*380, y: -20 });
  if (Math.random() < 0.003) deer.push({ x: Math.random()*380, y: -20 });

  if (Math.random() < (0.0015 + difficulty * 0.0009)) {
    raccoons.push({
      x: Math.random()*380,
      y: -20,
      dir: Math.random() < 0.5 ? -1 : 1
    });
  }
}

/* ---------------- COLLISION ---------------- */

function hit(a,b){
  return (
    a.x < b.x + 30 &&
    a.x + 30 > b.x &&
    a.y < b.y + 30 &&
    a.y + 30 > b.y
  );
}

/* ---------------- GAME OVER ---------------- */

function endGame() {
  gameOver = true;
  running = false;

  document.getElementById("finalScore").innerText =
    "Final Score: " + score;

  document.getElementById("gameOverScreen").style.display = "block";
}

/* ---------------- UPDATE ---------------- */

function update() {
  if (!running || gameOver) return;

  if (slowTimer > 0) slowTimer--;

  /* 🔥 SPEED INCREASE OVER TIME */
  speed += 0.0014 * difficulty;
  difficulty += 0.0007;

  /* 🧍 smooth player movement */
  player.x += (targetX - player.x) * 0.28;

  beers.forEach(b => b.y += speed + 1);
  campers.forEach(c => c.y += speed + 1.2);
  deer.forEach(d => d.y += speed + 0.9);

  /* 🦝 zig-zag raccoons */
  raccoons.forEach(r => {
    r.y += speed + 1.5;

    r.x += r.dir * (3 + difficulty * 0.6);

    if (Math.random() < 0.04) r.dir *= -1;

    if (r.x < 0) { r.x = 0; r.dir = 1; }
    if (r.x > 380) { r.x = 380; r.dir = -1; }
  });

  /* 🍺 beer */
  beers.forEach((b,i)=>{
    if(hit(player,b)){
      beers.splice(i,1);
      score++;
      drinkSound();
      updateHUD();
    }
  });

  /* 🚐 camper slow */
  campers.forEach((c,i)=>{
    if(hit(player,c)){
      campers.splice(i,1);
      slowTimer = 80;
      shake = 6;
      flash = 8;
      hitSound();
      updateHUD();
    }
  });

  /* 🦌 deer bonus */
  deer.forEach((d,i)=>{
    if(hit(player,d)){
      deer.splice(i,1);
      score += 5;
      drinkSound();
      updateHUD();
    }
  });

  /* 🦝 raccoon = game over */
  raccoons.forEach((r,i)=>{
    if(hit(player,r)){
      raccoons.splice(i,1);
      hitSound();
      endGame();
    }
  });

  beers = beers.filter(o=>o.y<700);
  campers = campers.filter(o=>o.y<700);
  deer = deer.filter(o=>o.y<700);
  raccoons = raccoons.filter(o=>o.y<700);

  spawn();
}

/* ---------------- DRAW ---------------- */

function draw() {
  ctx.clearRect(0,0,420,650);

  if(shake>0){
    ctx.setTransform(1,0,0,1,
      (Math.random()-0.5)*shake,
      (Math.random()-0.5)*shake
    );
    shake *= 0.85;
  } else {
    ctx.setTransform(1,0,0,1,0,0);
  }

  ctx.fillStyle="#1f6b2d";
  ctx.fillRect(0,0,420,650);

  ctx.fillStyle="#2b2b2b";
  ctx.fillRect(110,0,200,650);

  ctx.font="40px Arial";
  ctx.textAlign="center";

  ctx.fillText("🧍‍♂️",player.x,player.y);

  beers.forEach(b=>ctx.fillText("🍺",b.x,b.y));
  campers.forEach(c=>ctx.fillText("🚐",c.x,c.y));
  deer.forEach(d=>ctx.fillText("🦌",d.x,d.y));
  raccoons.forEach(r=>ctx.fillText("🦝",r.x,r.y));

  if(flash>0){
    ctx.fillStyle="rgba(255,255,255,0.08)";
    ctx.fillRect(0,0,420,650);
    flash--;
  }
}

/* ---------------- LOOP ---------------- */

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

/* ---------------- UI ---------------- */

function updateHUD(){
  document.getElementById("hud").innerText="Score: "+score;
}

function startGame(){
  document.getElementById("startScreen").style.display="none";
  running=true;
  updateHUD();
  startMusic();
}

loop();
</script>

</body>
</html>
